<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image:url(https://themes.webuniverseua.com/courses/HTML_CSS/theme26/resources/task2/background.png) ;
background-size: cover;
 margin: 0;
 padding: 0;
 height:100vh;
 overflow: hidden;
        }
img{
    width: 300px;
    height: 300px;
}
.rocket{
    position: absolute;
animation: fly 6s linear infinite;
}
@keyframes fly{
    0%{
        bottom: 100px; right: 100px;
    }
20% {
    bottom: 400px;   right: 300px;
}
40% { 
    bottom: 0px;     right: 300px;
    }
60% { 
    bottom: 200px;     right: 800px;
    }
80% { 
    bottom: 0px ;   right: 950px;
}
100% {
     bottom: 400px ;   right: 1200px;
}
}
    </style>
</head>
<body>
    <div class="rocket"><img src="https://themes.webuniverseua.com/courses/HTML_CSS/theme26/resources/task2/rocket.png" alt=""></div>
</body>
</html>
